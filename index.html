<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>身体日记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.app {
  width: 100%;
  max-width: 420px;
  background: #fff;
  min-height: 100vh;
  position: relative;
  padding-bottom: 64px;
}

/* ===== Tab Panels ===== */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  justify-content: space-around;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
  z-index: 200;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 20px;
  cursor: pointer;
  color: #999;
  font-size: 10px;
  font-weight: 500;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-item .tab-icon { font-size: 22px; }
.tab-item .tab-icon svg { width: 22px; height: 22px; stroke: #999; }
.tab-item.active .tab-icon svg { stroke: #EC4899; }

/* Icon base style */
.icon {
  display: inline-block;
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  vertical-align: middle;
}
.icon-sm { width: 14px; height: 14px; }
.icon-md { width: 18px; height: 18px; }
.icon-lg { width: 22px; height: 22px; }
.tab-item.active { color: #EC4899; font-weight: 600; }

/* ===== Today Dashboard ===== */
.today-container { padding: 14px 16px 20px; }

.today-header-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.today-date {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
}
.today-weekday {
  font-size: 14px;
  color: #999;
}

.today-ganzhi {
  font-size: 13px;
  color: #6B7280;
  background: #F9FAFB;
  padding: 4px 10px;
  border-radius: 16px;
  white-space: nowrap;
}
.today-ganzhi .gz-auspicious {
  color: #DC2626;
  font-weight: 700;
  font-size: 14px;
  animation: gzPulse 2s ease-in-out infinite;
}
@keyframes gzPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.today-reminders { display: flex; flex-direction: column; gap: 8px; }

/* Today courses card */
.today-courses {
  margin-bottom: 10px;
  background: #FAF5FF;
  border-radius: 12px;
  padding: 12px 14px;
}
.today-courses-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.today-courses-icon { font-size: 16px; }
.today-courses-title {
  font-size: 13px; font-weight: 600; color: #6D28D9;
}
.today-course-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0;
}
.today-course-item + .today-course-item {
  border-top: 1px solid #EDE9FE;
}
.today-course-name {
  font-size: 13px; font-weight: 600; color: #333;
}
.today-course-tag {
  font-size: 10px; background: #EDE9FE;
  color: #7C3AED; padding: 1px 6px; border-radius: 4px;
  font-weight: 500;
}
.today-course-detail {
  font-size: 12px; color: #888;
}
.reminder-card {
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fafafa;
}
.reminder-card.warn {
  background: #FFF5F5;
  border: 1px solid #FECACA;
}
.reminder-card.info {
  background: #EFF6FF;
  border: 1px solid #BFDBFE;
}
.reminder-card.ok {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
}

.reminder-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.reminder-icon.period { background: #FDF2F8; }
.reminder-icon.litter { background: #EFF6FF; }
.reminder-icon.food { background: #FFFBEB; }
.reminder-icon.calendar { background: #F5F3FF; }

.reminder-body { flex: 1; min-width: 0; }
.reminder-title { font-size: 14px; font-weight: 600; color: #333; }
.reminder-desc { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.4; }

.reminder-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
}
.reminder-badge.urgent { background: #FEE2E2; color: #DC2626; }
.reminder-badge.normal { background: #EEF2FF; color: #4F46E5; }

/* Action reminder with check button */
.reminder-action {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2px solid #D1D5DB;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 15px; color: #D1D5DB;
  transition: all 0.15s;
  user-select: none;
}
.reminder-action:hover { border-color: #10B981; color: #10B981; background: #ECFDF5; }
.reminder-action:active { transform: scale(0.88); }

/* No reminders */
.today-empty {
  text-align: center;
  padding: 30px 20px;
  color: #ccc;
  font-size: 14px;
}

/* Overview summary */
.today-summary {
  margin-top: 16px;
  background: #fafafa;
  border-radius: 14px;
  padding: 14px 16px;
}
.today-summary-title {
  font-size: 13px; font-weight: 600; color: #999;
  margin-bottom: 10px;
}
.today-summary-row {
  display: flex; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}
.today-summary-row:last-child { border-bottom: none; }
.today-summary-label { color: #888; }
.today-summary-val { color: #333; font-weight: 500; }
.expense-quick {
  margin-top: 12px;
  background: #fafafa; border-radius: 14px; padding: 12px 14px;
}
.expense-quick-row {
  display: flex; justify-content: space-between; align-items: center;
}
.expense-quick-label { font-size: 12px; color: #999; margin-right: 6px; }
.expense-quick-amount { font-size: 20px; font-weight: 700; color: #333; }

.expense-add-btn {
  background: #EC4899; color: #fff; border: none;
  border-radius: 16px; padding: 6px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}

.expense-form {
  display: none; margin-top: 10px;
}
.expense-form.show { display: block; }

.expense-form-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.expense-form-row:last-child { margin-bottom: 0; }

.expense-amount {
  flex: 1; border: 1px solid #e5e5e5; border-radius: 10px;
  padding: 10px 14px; font-size: 18px; font-weight: 600;
  outline: none; font-family: inherit; background: #fff;
}
.expense-amount:focus { border-color: #EC4899; }

.expense-cats {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.expense-cat {
  padding: 6px 12px; border-radius: 16px; border: 1px solid #e5e5e5;
  background: #fff; font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.expense-cat:hover { border-color: #EC4899; }
.expense-cat.selected {
  background: #FDF2F8; border-color: #EC4899; color: #EC4899; font-weight: 600;
}

.expense-note {
  flex: 1; border: 1px solid #e5e5e5; border-radius: 10px;
  padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; background: #fff;
}
.expense-note:focus { border-color: #EC4899; }

.expense-save {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  background: #EC4899; color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer;
}

/* ===== Expense Tab Page ===== */
.expense-page { padding: 14px 16px 20px; }

.expense-month-bar {
  display: flex; justify-content: center; align-items: center; gap: 16px;
  margin-bottom: 16px;
}
.expense-month-bar .strip-nav-btn { width: 30px; height: 30px; }
.expense-month-label { font-size: 16px; font-weight: 700; color: #1a1a1a; }

.expense-month-total {
  text-align: center; margin-bottom: 18px;
}
.expense-total-label { font-size: 13px; color: #999; display: block; margin-bottom: 4px; }
.expense-total-amount { font-size: 36px; font-weight: 700; color: #333; }

/* Category breakdown bars */
.expense-cat-breakdown { margin-bottom: 18px; }
.expense-cat-row {
  display: flex; align-items: center; padding: 8px 0; gap: 10px;
  border-bottom: 1px solid #f5f5f5;
}
.expense-cat-icon { font-size: 18px; width: 32px; text-align: center; flex-shrink: 0; }
.expense-cat-name { font-size: 13px; width: 40px; flex-shrink: 0; color: #555; }
.expense-cat-bar-wrap { flex: 1; height: 18px; background: #f0f0f0; border-radius: 9px; overflow: hidden; position: relative; }
.expense-cat-bar { height: 100%; border-radius: 9px; min-width: 4px; }
.expense-cat-amount { font-size: 12px; font-weight: 600; color: #333; width: 56px; text-align: right; flex-shrink: 0; }
.expense-cat-pct { font-size: 11px; color: #aaa; width: 36px; text-align: right; flex-shrink: 0; }

/* Daily list */
.expense-daily-list { }
.expense-day-group {
  margin-bottom: 12px;
}
.expense-day-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 4px;
}
.expense-day-date {
  font-size: 13px; font-weight: 600; color: #555;
}
.expense-day-total {
  font-size: 13px; font-weight: 600; color: #EC4899;
}
.expense-item {
  display: flex; align-items: center; padding: 6px 0; gap: 8px;
  font-size: 13px;
}
.expense-item-cat {
  font-size: 14px; flex-shrink: 0;
}
.expense-item-note { flex: 1; color: #888; }
.expense-item-amount { font-weight: 500; color: #333; }
.expense-item-del {
  width: 22px; height: 22px; border-radius: 11px; border: none;
  background: #fee2e2; color: #ef4444; font-size: 10px;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.expense-empty {
  text-align: center; padding: 30px; color: #ccc; font-size: 14px;
}

/* ===== Learning Tab - Month Calendar ===== */
.learn-page { padding: 10px 16px 20px; }

.learn-month-nav {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.learn-month-btn {
  border: none; background: #f3f4f6; color: #333;
  width: 32px; height: 32px; border-radius: 10px;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.learn-month-btn:hover { background: #e5e7eb; }
.learn-month-label {
  flex: 1; text-align: center;
  font-size: 14px; font-weight: 600; color: #333;
}
.learn-month-today {
  width: auto; padding: 0 12px; font-size: 12px;
  background: #EDE9FE; color: #7C3AED;
}

/* Month calendar grid */
.learn-cal {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.learn-cal-header {
  font-size: 10px; color: #999;
  text-align: center; padding: 4px 0 6px;
  font-weight: 500;
}
.learn-cal-header.weekend { color: #ccc; }

.learn-day {
  background: #fafafa;
  border-radius: 8px;
  padding: 4px;
  min-height: 80px;
  display: flex; flex-direction: column;
  border: 1px solid transparent;
}
.learn-day.other-month { background: transparent; }
.learn-day.today {
  border-color: #A78BFA; background: #FAF5FF;
}

.learn-day-num {
  font-size: 12px; font-weight: 600; color: #333;
  text-align: center; margin-bottom: 2px;
  line-height: 1;
}
.learn-day.other-month .learn-day-num { color: #ddd; }
.learn-day.today .learn-day-num { color: #7C3AED; }

.learn-day-course {
  font-size: 10px; line-height: 1.4;
  text-align: center; color: #666; font-weight: 500;
  padding: 1px 0;
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}

.learn-day-label {
  font-size: 9px; color: #bbb; text-align: center;
  line-height: 1.2; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== Top: Phase Bar ===== */
.phase-bar {
  margin: 14px 16px;
  padding: 12px 16px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}

.phase-bar .bar-emoji { font-size: 20px; }
.phase-bar .bar-emoji svg { width: 20px; height: 20px; vertical-align: middle; }
.phase-bar .bar-detail { font-size: 12px; opacity: 0.85; font-weight: 400; margin-left: auto; }

.phase-bar.menses { background: linear-gradient(135deg, #F472B6, #EC4899); }
.phase-bar.follicular { background: linear-gradient(135deg, #60A5FA, #3B82F6); }
.phase-bar.ovulation { background: linear-gradient(135deg, #A78BFA, #8B5CF6); }
.phase-bar.luteal { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
.phase-bar.unknown { background: #e5e5e5; color: #888; }
.phase-bar.late { background: linear-gradient(135deg, #FB7185, #EF4444); }

/* "月经来了" button in phase bar */
.phase-bar .bar-action {
  margin-left: 8px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.9);
  color: #EC4899;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  border: none;
  transition: background 0.15s;
}
.phase-bar .bar-action:hover { background: #fff; }
.phase-bar.late .bar-action { color: #EF4444; }

/* ===== Mini Month Strip ===== */
.month-strip {
  margin: 0 16px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.month-strip-label {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}

.month-strip-nav {
  display: flex;
  gap: 4px;
}

.strip-nav-btn {
  width: 28px; height: 28px;
  border: none; background: #f0f0f0;
  border-radius: 8px; font-size: 12px;
  cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
}

.mini-cal {
  margin: 0 16px 14px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  font-size: 11px;
  text-align: center;
}

.mini-cal .mini-dow {
  color: #bbb;
  font-weight: 600;
  padding: 2px 0;
}

.mini-cal .mini-day {
  padding: 5px 0;
  border-radius: 6px;
  cursor: pointer;
  color: #aaa;
  font-weight: 500;
  transition: background 0.15s;
}

.mini-cal .mini-day.this-month { color: #555; }
.mini-cal .mini-day.today { background: #FDF2F8; color: #EC4899; font-weight: 700; }
.mini-cal .mini-day.has-record::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  border-radius: 50%;
  margin: 2px auto 0;
}

.mini-cal .mini-day.has-period::after { background: #EC4899; }
.mini-cal .mini-day.has-mood:not(.has-period)::after { background: #F59E0B; }
.mini-cal .mini-day.has-tag:not(.has-period):not(.has-mood)::after { background: #60A5FA; }

.mini-cal .mini-day.selected {
  background: #EC4899;
  color: #fff;
}

/* ===== Section Divider ===== */
.section-divider {
  margin: 0 16px 12px;
  font-size: 12px;
  color: #bbb;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== Diary Entry Card ===== */
.diary-list {
  padding: 0 16px 20px;
}

.entry-card {
  background: #fafafa;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}

.entry-card:active { background: #f0f0f0; }

.entry-card .entry-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.entry-date {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}

.entry-weekday {
  font-size: 12px;
  color: #999;
  font-weight: 400;
}

.entry-phase-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  color: #fff;
}

.phase-tag-menses { background: #EC4899; }
.phase-tag-follicular { background: #3B82F6; }
.phase-tag-ovulation { background: #8B5CF6; }
.phase-tag-luteal { background: #F59E0B; }
.phase-tag-late { background: #EF4444; }

/* Period flow line */
.entry-period {
  font-size: 14px;
  color: #EC4899;
  font-weight: 600;
  margin-bottom: 8px;
  padding: 8px 12px;
  background: #FDF2F8;
  border-radius: 8px;
  display: inline-block;
}

/* Mood display */
.entry-mood-line {
  font-size: 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.entry-mood-emoji {
  font-size: 28px;
}

.entry-mood-text {
  font-size: 15px;
  color: #555;
  font-weight: 600;
}

/* Body state tags */
.entry-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}

.entry-tag {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: #EEF2FF;
  color: #4F46E5;
  font-weight: 500;
}

/* Note */
.entry-note {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
  margin-top: 4px;
}

/* Prediction tip */
.entry-prediction {
  font-size: 12px;
  color: #888;
  padding: 6px 10px;
  background: #fafafa;
  border-radius: 6px;
  margin-bottom: 8px;
  border-left: 3px solid #ddd;
}

.entry-card:has(.phase-tag-menses) .entry-prediction { border-left-color: #EC4899; background: #FDF2F8; color: #BE185D; }
.entry-card:has(.phase-tag-follicular) .entry-prediction { border-left-color: #3B82F6; background: #EFF6FF; color: #1D4ED8; }
.entry-card:has(.phase-tag-ovulation) .entry-prediction { border-left-color: #8B5CF6; background: #F5F3FF; color: #6D28D9; }
.entry-card:has(.phase-tag-luteal) .entry-prediction { border-left-color: #F59E0B; background: #FFFBEB; color: #B45309; }
.entry-card:has(.phase-tag-late) .entry-prediction { border-left-color: #EF4444; background: #FEF2F2; color: #B91C1C; }

/* Empty diary */
.empty-diary {
  text-align: center;
  padding: 60px 20px;
  color: #ccc;
}

.empty-diary .empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-diary .empty-text { font-size: 15px; }
.empty-diary .empty-sub { font-size: 13px; color: #ddd; margin-top: 6px; }

/* ===== Floating Action Button ===== */
.fab {
  position: fixed;
  bottom: 80px;
  right: 50%;
  transform: translateX(210px);
  width: 56px;
  height: 56px;
  border-radius: 28px;
  background: #EC4899;
  color: #fff;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(236, 72, 153, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: transform 0.2s, box-shadow 0.2s;
}

.fab:active {
  transform: translateX(210px) scale(0.92);
  box-shadow: 0 2px 8px rgba(236, 72, 153, 0.3);
}

@media (max-width: 420px) {
  .fab {
    right: 16px;
    transform: none;
    bottom: 76px;
  }
  .fab:active { transform: scale(0.92); }
}

/* ===== Bottom Sheet ===== */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
.overlay.active { display: flex; }

.sheet {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 420px; max-height: 85vh;
  overflow-y: auto; padding: 8px 0 24px;
  animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 36px; height: 4px;
  background: #ddd; border-radius: 2px;
  margin: 0 auto 16px;
}

.sheet-header {
  padding: 0 20px 12px;
  border-bottom: 1px solid #f0f0f0;
  display: flex; justify-content: space-between; align-items: center;
}

.sheet-header h3 { font-size: 17px; font-weight: 700; color: #1a1a1a; }

.sheet-close {
  width: 30px; height: 30px;
  border: none; background: #f0f0f0;
  border-radius: 15px; font-size: 16px;
  cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
}

.sheet-body { padding: 16px 20px; }

.sheet-section { margin-bottom: 18px; }

.sheet-label {
  font-size: 12px; font-weight: 600; color: #aaa;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}

/* Flow pills */
.flow-row { display: flex; gap: 6px; }
.flow-pill {
  flex: 1; padding: 10px 6px;
  border: 2px solid #eee; border-radius: 10px;
  text-align: center; font-size: 12px; cursor: pointer;
  transition: all 0.15s; color: #888; background: #fff;
}
.flow-pill .pill-icon { font-size: 16px; display: block; margin-bottom: 2px; }
.flow-pill.selected { border-color: #EC4899; background: #FDF2F8; color: #EC4899; font-weight: 600; }

/* Mood grid */
.mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.mood-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px; border-radius: 12px; cursor: pointer;
  border: 2px solid transparent; font-size: 12px; color: #888;
  transition: all 0.15s;
}
.mood-btn .mood-emoji { font-size: 24px; margin-bottom: 2px; }
.mood-btn.selected { border-color: #F472B6; background: #FDF2F8; color: #DB2777; font-weight: 600; }

/* Tag chips */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1.5px solid #eee; cursor: pointer; color: #888;
  transition: all 0.15s; background: #fff;
}
.tag-chip.selected { border-color: #6366F1; background: #EEF2FF; color: #4F46E5; font-weight: 600; }

.note-input {
  width: 100%; padding: 12px; border: 1.5px solid #eee;
  border-radius: 10px; font-size: 14px; resize: none;
  font-family: inherit; min-height: 60px;
}
.note-input:focus { outline: none; border-color: #EC4899; }
.note-input::placeholder { color: #ddd; }

.btn {
  border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; padding: 12px;
  transition: all 0.15s;
}
.btn-full { width: 100%; margin-top: 8px; }
.btn-primary { background: #EC4899; color: #fff; }
.btn-primary:active { background: #DB2777; }
.btn-danger { background: #fef2f2; color: #e74c3c; }
.btn-danger:active { background: #fee; }

/* Settings */
.settings-panel { padding: 20px; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid #f0f0f0;
}
.setting-label { font-size: 14px; color: #333; }

.setting-input {

}
.setting-input:focus { outline: none; border-color: #EC4899; }

<script>
// ===== State =====
let currentYear = 2026;
let currentMonth = 5; // 0-based: June
let currentDate = null;
let selectedFlow = 'none';
let selectedMood = null;
let selectedTags = [];
let currentTab = 'today';

// ===== Tab Switching =====
function switchTab(tab) {
  currentTab = tab;
  // Update panels
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  // Update tab bar
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-item[data-tab="' + tab + '"]').classList.add('active');
  // Refresh relevant content
  if (tab === 'today') renderToday();
  if (tab === 'diary') renderDiaryTab();
  if (tab === 'expense') renderExpensePage();
  if (tab === 'learn') renderLearnPage();
}

// ===== Today Dashboard =====
function renderToday() {
  const data = getData();
  const today = getToday();
  const { year, month, day } = parseDate(today);
  const dow = dayName(new Date(year, month, day).getDay());

  document.getElementById('todayDate').textContent = `${month+1}月${day}日`;
  document.getElementById('todayWeekday').textContent = `周${dow}`;
  
  // 日柱
  const gz = getDayGanZhi(today);
  document.getElementById('todayGanZhi').innerHTML = 
    `${gz.ganZhi}日 · ${gz.stem}${gz.stemEl} + ${gz.branch}${gz.branchEl}` + (gz.isAuspicious ? ` <span class="gz-auspicious">吉</span>` : '');

  let reminders = [];
  const s = data.settings;

  // 1. Period coming reminder
  if (s.lastPeriodStart) {
    const nextPeriod = new Date(s.lastPeriodStart);
    nextPeriod.setDate(nextPeriod.getDate() + s.cycleLength);
    const nextPeriodStr = fmt(nextPeriod.getFullYear(), nextPeriod.getMonth(), nextPeriod.getDate());
    const daysUntil = diffDays(today, nextPeriodStr);
    
    if (daysUntil <= 0) {
      // 已过预期经期
      const phase = getPhase(data);
      if (phase && phase.phase === 'menses') {
        reminders.push({
          icon: '🩸', iconClass: 'period',
          title: '正在经期中',
          desc: `${phase.detail}`,
          badge: '进行中', badgeClass: 'urgent'
        });
      } else if (phase && phase.phase === 'late') {
        const lateDays = -daysUntil;
        reminders.push({
          icon: '⏰', iconClass: 'period',
          title: '经期已延迟',

function renderExpensePage() {
  if (!expenseYear) initExpenseState();
  document.getElementById('expenseMonthLabel').textContent = `${expenseYear}年${expenseMonth+1}月`;
  
  const data = getData();
  const prefix = `${expenseYear}-${String(expenseMonth+1).padStart(2,'0')}-`;
  
  // Collect all items for this month
  let allItems = [];
  let monthlyTotal = 0;
  const catTotals = {};
  EXPENSE_CATS.forEach(c => catTotals[c.key] = 0);

  if (data.expenses) {
    for (const [date, items] of Object.entries(data.expenses)) {
      if (date.startsWith(prefix)) {
        for (const item of items) {
          allItems.push({ date, ...item });
          monthlyTotal += item.amount;
          catTotals[item.category] = (catTotals[item.category] || 0) + item.amount;
        }
      }
    }
  }

  // Total
  document.getElementById('expenseTotalAmount').textContent = monthlyTotal.toFixed(2);

  renderCatBreakdown(catTotals, monthlyTotal);

function renderCatBreakdown(catTotals, monthlyTotal) {
  const el = document.getElementById('expenseCatBreakdown');
  const catEmoji = {};
  const catColor = {};
  EXPENSE_CATS.forEach(c => { catEmoji[c.key] = c.emoji; catColor[c.key] = c.color; });

  const sorted = EXPENSE_CATS
    .map(c => ({ ...c, amount: catTotals[c.key] }))

  if (monthlyTotal === 0) {
    el.innerHTML = '<div class="expense-empty">暂无记录</div>';
    return;
  }

  el.innerHTML = sorted.filter(c => c.amount > 0).map(c => {
    const pct = ((c.amount / monthlyTotal) * 100).toFixed(0);
    const barW = Math.max(pct, 3);
    return `<div class="expense-cat-row">
      <span class="expense-cat-icon">${c.emoji}</span>
      <span class="expense-cat-name">${c.key}</span>

function renderDailyList(allItems) {
  const el = document.getElementById('expenseDailyList');
  if (allItems.length === 0) {
    el.innerHTML = '<div class="expense-empty">这个月还没有记账</div>';
    return;
  }

  // Group by date (newest first)
  const groups = {};
  for (const item of allItems) {
    if (!groups[item.date]) groups[item.date] = { total: 0, items: [] };
    groups[item.date].total += item.amount;
    groups[item.date].items.push(item);
  }

  const sortedDates = Object.keys(groups).sort().reverse();
  const catEmoji = {};
  EXPENSE_CATS.forEach(c => catEmoji[c.key] = c.emoji);

  el.innerHTML = sortedDates.map(date => {
    const g = groups[date];
    const [y, m, d] = date.split('-').map(Number);
    const dow = ['日','一','二','三','四','五','六'][new Date(y, m-1, d).getDay()];
    return `<div class="expense-day-group">
      <div class="expense-day-header">
        <span class="expense-day-date">${m}月${d}日 周${dow}</span>
        <span class="expense-day-total">¥${g.total.toFixed(2)}</span>

        <div class="expense-item">

  }).join('');
}

  const data = getData();

  if (data.expenses[date].length === 0) delete data.expenses[date];

function fmt(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDate(str) { const [y,m,d]=str.split('-').map(Number); return {year:y,month:m-1,day:d}; }
function getToday() { const d=new Date(); return fmt(d.getFullYear(),d.getMonth(),d.getDate()); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }

// 干支日计算
function getDayGanZhi(dateStr) {
  const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const EL = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
  // 地支五行: 寅卯木 巳午火 申酉金 亥子水 辰戌丑未土
  const BEL = { '寅':'木','卯':'木','巳':'火','午':'火','申':'金','酉':'金','亥':'水','子':'水','辰':'土','戌':'土','丑':'土','未':'土' };
  const ref = Date.UTC(1900, 0, 1);
  const [y,m,d] = dateStr.split('-').map(Number);
  const target = Date.UTC(y, m-1, d);
  const daysDiff = Math.round((target - ref) / 86400000);
  const idx = ((10 + daysDiff) % 60 + 60) % 60;
  const stem = STEMS[idx % 10];
  const branch = BRANCHES[idx % 12];
  const stemEl = EL[stem];
  const branchEl = BEL[branch];
  return {
    ganZhi: stem + branch,
    stem, branch,
    stemEl, branchEl,
    element: stemEl,
    isAuspicious: stemEl === '土' || stemEl === '金'
  };
}

// ===== Phase =====
function getPhase(data) {
  const s = data.settings;
  if (!s.lastPeriodStart) return null;
  const today = getToday();
  const dayInCycle = diffDays(s.lastPeriodStart, today) + 1;
  if (dayInCycle <= 0) {
    const until = -dayInCycle + 1;
    return { phase:'luteal', day:dayInCycle, detail:`预计 ${until} 天后来月经` };
  }
  const cl = s.cycleLength;
  const pl = s.periodLength;

  // 超过周期天数 → 经期延迟，不自动循环
  if (dayInCycle > cl) {
    const lateDays = dayInCycle - cl;
    return { phase:'late', day:dayInCycle, detail:`已延迟 ${lateDays} 天 · 周期第${dayInCycle}天` };
  }

  const day = dayInCycle;
  if (day <= pl) {
    return { phase:'menses', day, detail:`经期第${day}天 · 还剩${pl-day+1}天` };
  }
  const ovDay = cl - 14;
  if (day < ovDay) {
    return { phase:'follicular', day, detail:`卵泡期 · 距排卵约${ovDay-day}天` };
  }
  if (day <= ovDay + 2) {
    return { phase:'ovulation', day, detail:'排卵期 · 易孕期' };
  }
  return { phase:'luteal', day, detail:`黄体期 · 距经期约${cl-day+1}天` };
}

function getPhaseInfo(data, dateStr) {
  const s = data.settings;
  if (!s.lastPeriodStart) return null;
  const d = diffDays(s.lastPeriodStart, dateStr) + 1;
  if (d <= 0) return null;
  const cl = s.cycleLength, pl = s.periodLength;

  // 超过周期天数 → 延迟
  if (d > cl) {
    const lateDays = d - cl;
    return { phase:'late', phaseDay:lateDays, phaseTotal:null, cycleDay:d, prediction:`经期已延迟 ${lateDays} 天，注意观察身体状态 🔍` };
  }

  const cycleDay = d;
  const ovDay = cl - 14;
  const ovWindow = 3;

  let phase, phaseDay, phaseTotal, prediction;

  if (cycleDay <= pl) {
    phase = 'menses';
    phaseDay = cycleDay;
    phaseTotal = pl;
    if (cycleDay <= 2) prediction = '经期初期，注意保暖休息 ☕';
    else if (cycleDay <= pl - 1) prediction = '经期中段，多喝热水，适当休息 🛌';
    else prediction = '经期末尾，状态逐渐恢复 🌿';
  } else if (cycleDay < ovDay) {
    phase = 'follicular';
    phaseDay = cycleDay - pl;
    phaseTotal = ovDay - pl;
    if (phaseDay <= 3) prediction = '卵泡期初期，精力开始回升 💫';
    else prediction = '卵泡期，状态越来越好，皮肤在变好 ✨';
  } else if (cycleDay <= ovDay + ovWindow - 1) {
    phase = 'ovulation';
    phaseDay = cycleDay - ovDay + 1;
    phaseTotal = ovWindow;
    prediction = '排卵期，精力旺盛，适合运动和社交 🏃‍♀️';
  } else {
    phase = 'luteal';
    phaseDay = cycleDay - ovDay - ovWindow + 1;
    phaseTotal = cl - ovDay - ovWindow + 1;
    if (phaseDay <= 3) prediction = '黄体期早期，状态平稳 😌';
    else if (phaseDay <= phaseTotal - 5) prediction = '黄体中期，可能出现情绪波动 🌊';
    else if (phaseDay <= phaseTotal - 3) prediction = '经前数日，注意腹胀、胸胀 ⚠️';
    else prediction = '经前最后几天，疲劳加重、情绪敏感，对自己好一点 💆‍♀️';
  }

  return { phase, phaseDay, phaseTotal, cycleDay, prediction };
}

function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function renderLearnPage() {
  if (_learnMonth === null) {
    const today = new Date();
    _learnMonth = { year: today.getFullYear(), month: today.getMonth() };
  }
  const { year, month } = _learnMonth;
  const todayStr = getToday();
  const now = new Date();

  // Label
  document.getElementById('learnMonthLabel').textContent = `${year}年${month+1}月`;

  // Weekday headers
  const dayNames = ['一','二','三','四','五','六','日'];
  let html = dayNames.map((n, i) => {
    const we = i >= 5 ? ' weekend' : '';
    return `<div class="learn-cal-header${we}">周${n}</div>`;
  }).join('');

  // First day and last day of month
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const totalDays = lastDay.getDate();
  const startDow = firstDay.getDay(); // 0=Sun
  const startOffset = startDow === 0 ? 6 : startDow - 1; // days to fill before 1st (Mon=0)

  // Prev month trailing days
  const prevLastDay = new Date(year, month, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) {
    const day = prevLastDay - i;
    const pm = month === 0 ? 11 : month - 1;
    const py = month === 0 ? year - 1 : year;
    const ds = fmtDate(new Date(py, pm, day));
    html += renderDayCell(day, 'other-month', ds, todayStr);
  }

  // Current month days
  for (let day = 1; day <= totalDays; day++) {
    const ds = fmtDate(new Date(year, month, day));
    const isToday = ds === todayStr;
    html += renderDayCell(day, isToday ? 'today' : '', ds, todayStr);
  }

  // Next month leading days to fill last row
  const remaining = (startOffset + totalDays) % 7;
  if (remaining > 0) {
    for (let day = 1; day <= 7 - remaining; day++) {
      const nm = month === 11 ? 0 : month + 1;
      const ny = month === 11 ? year + 1 : year;
      const ds = fmtDate(new Date(ny, nm, day));
      html += renderDayCell(day, 'other-month', ds, todayStr);
    }
  }

  document.getElementById('learnCal').innerHTML = html;
}

function renderDayCell(dayNum, extraCls, dateStr, todayStr) {
  const dayCourses = COURSE_DATA.filter(c => c.date === dateStr);
  
  let coursesHtml = '';
  dayCourses.forEach(c => {
    coursesHtml += `<div class="learn-day-course ${c.course}">${COURSE_NAMES[c.course]}</div>`;
    coursesHtml += `<div class="learn-day-label">${c.label}</div>`;
  });

  return `<div class="learn-day ${extraCls}">
    <div class="learn-day-num">${dayNum}</div>
    ${coursesHtml}
  </div>`;
}

function learnPrevMonth() {
  if (_learnMonth.month === 0) { _learnMonth.month = 11; _learnMonth.year--; }
  else _learnMonth.month--;
  renderLearnPage();
}
function learnNextMonth() {
  if (_learnMonth.month === 11) { _learnMonth.month = 0; _learnMonth.year++; }
  else _learnMonth.month++;
  renderLearnPage();
}
function learnGoThisMonth() {
  const today = new Date();
  _learnMonth = { year: today.getFullYear(), month: today.getMonth() };
  renderLearnPage();
}

function renderPhaseBar() {
  const data = getData();
  const p = getPhase(data);
  const bar = document.getElementById('phaseBar');
  const emojiEl = document.getElementById('phaseEmoji');
  const btn = document.getElementById('periodStartBtn');

  if (!p) {
    bar.className = 'phase-bar unknown';
    emojiEl.innerHTML = '<svg class="icon" style="width: 20px; height: 20px;"><use href="#icon-calendar"></use></svg>';
    document.getElementById('phaseText').textContent = '请先设置经期日期';
    document.getElementById('phaseDay').textContent = '';
    btn.style.display = 'none';
    return;
  }

  bar.className = 'phase-bar ' + p.phase;
  emojiEl.innerHTML = '<svg class="icon" style="width: 20px; height: 20px;"><use href="#icon-calendar"></use></svg>';
  document.getElementById('phaseText').textContent = PHASE_NAMES[p.phase];
  document.getElementById('phaseDay').textContent = p.detail;

  // 经期延迟 或 黄体期最后3天 → 显示"月经来了"按钮
  const cl = data.settings.cycleLength;
  if (p.phase === 'late') {
    btn.style.display = 'block';
    btn.textContent = '月经来了';
  } else if (p.phase === 'luteal' && p.day >= cl - 2) {
    btn.style.display = 'block';
    btn.textContent = '月经来了';
  } else {
    btn.style.display = 'none';
  }
}

// 用户确认月经来了 → 开始新周期
function markPeriodStart() {

function renderMiniCal() {
  const grid = document.getElementById('miniCal');
  const data = getData();
  const today = getToday();
  const m = currentMonth;
  const y = currentYear;

  document.getElementById('monthStripLabel').textContent = `${y}年${m+1}月`;

  let html = '';
  ['一','二','三','四','五','六','日'].forEach(d => {
    html += `<span class="mini-dow">${d}</span>`;
  });

  const firstDOW = new Date(y,m,1).getDay();
  const offset = firstDOW === 0 ? 6 : firstDOW - 1;
  const totalDays = daysInMonth(y,m);
  const prevDays = daysInMonth(y, m-1);

  for (let i = offset-1; i >= 0; i--) {
    html += miniDayHtml(prevDays - i, false, today, data, y, m-1);
  }
  for (let d=1; d<=totalDays; d++) {
    html += miniDayHtml(d, true, today, data, y, m);
  }
  const rem = 42 - (offset + totalDays);
  for (let d=1; d<=rem; d++) {
    html += miniDayHtml(d, false, today, data, y, m+1);
  }

  grid.innerHTML = html;

  // Add click handlers
  grid.querySelectorAll('.mini-day.this-month').forEach(el => {
    el.addEventListener('click', () => {
      const day = parseInt(el.dataset.day);
      const ds = fmt(currentYear, currentMonth, day);
      openRecordSheet(ds);
    });
  });
}

function miniDayHtml(day, thisMonth, today, data, y, m) {
  const ds = fmt(y, m, day);
  const rec = data.records[ds];
  let cls = 'mini-day';
  if (thisMonth) cls += ' this-month';
  if (ds === today) cls += ' today';
  if (rec) {
    if (rec.flow && rec.flow !== 'none') cls += ' has-record has-period';
    else if (rec.mood) cls += ' has-record has-mood';
    else if (rec.tags && rec.tags.length > 0) cls += ' has-record has-tag';
    else cls += ' has-record';
  }
  return `<span class="${cls}" data-day="${day}">${day}</span>`;
}

function renderDiary() {
  const data = getData();
  const today = getToday();
  const list = document.getElementById('diaryList');
  const empty = document.getElementById('emptyDiary');

  // Collect records for current month, sorted newest first
  const records = [];

  for (const [ds, rec] of Object.entries(data.records)) {
    // Only show records for current month
    const { year, month } = parseDate(ds);
    if (year === currentYear && month === currentMonth) {
      records.push({ ds, rec });
    }
  }

  records.sort((a,b) => b.ds.localeCompare(a.ds));

  if (records.length === 0) {
    empty.style.display = 'block';
    // Remove any entry cards
    list.querySelectorAll('.entry-card').forEach(c => c.remove());
    return;
  }

  empty.style.display = 'none';

  let html = '';
  const flowLabels = { light:'少量', medium:'中等', heavy:'偏多' };

  for (const { ds, rec } of records) {
    const { year, month, day } = parseDate(ds);
    const dow = dayName(new Date(year, month, day).getDay());
    const info = getPhaseInfo(data, ds);

    html += '<div class="entry-card" data-date="' + ds + '">';
    html += '<div class="entry-header">';
    html += `<span class="entry-date">${month+1}月${day}日 <span class="entry-weekday">周${dow}</span></span>`;
    if (info) {
      if (info.phase === 'late') {
        html += `<span class="entry-phase-tag phase-tag-late">经期延迟${info.phaseDay}天</span>`;
      } else {
        html += `<span class="entry-phase-tag phase-tag-${info.phase}">${PHASE_NAMES[info.phase]}第${info.phaseDay}天</span>`;
      }
    }
    html += '</div>';

    // Prediction tip
    if (info && info.prediction) {
      html += `<div class="entry-prediction">${info.prediction}</div>`;
    }

    if (rec.flow && rec.flow !== 'none') {
      html += `<div class="entry-period">🩸 经期 · ${flowLabels[rec.flow]}</div>`;
    }

    if (rec.mood) {
      html += `<div class="entry-mood-line"><span class="entry-mood-emoji">${MOOD_MAP[rec.mood]}</span><span class="entry-mood-text">${MOOD_TEXT[rec.mood]}</span></div>`;
    }

    if (rec.tags && rec.tags.length > 0) {
      html += '<div class="entry-tags">';
      rec.tags.forEach(t => { html += `<span class="entry-tag">${t}</span>`; });
      html += '</div>';
    }

    if (rec.note) {
      html += `<div class="entry-note">${rec.note}</div>`;
    }

    html += '</div>';
  }

  // Preserve empty div, add cards after
  const existing = list.querySelectorAll('.entry-card');
  existing.forEach(c => c.remove());
  list.insertAdjacentHTML('beforeend', html);

  // Add click handlers
  list.querySelectorAll('.entry-card').forEach(card => {
    card.addEventListener('click', () => {
      openRecordSheet(card.dataset.date);
    });
  });
}

// ===== Sheet =====
function openRecordSheet(dateStr) {
  const data = getData();
  const rec = data.records[dateStr] || null;
  const { year, month, day } = parseDate(dateStr);
  currentDate = dateStr;
  selectedFlow = rec ? rec.flow || 'none' : 'none';
  selectedMood = rec ? rec.mood : null;
  selectedTags = rec ? (rec.tags || []).slice() : [];
  document.getElementById('noteInput').value = rec ? rec.note || '' : '';
  document.getElementById('sheetDate').textContent = `${month+1}月${day}日 周${dayName(new Date(year,month,day).getDay())}`;
  document.getElementById('deleteBtn').style.display = rec ? 'block' : 'none';
  updateFlowUI(); updateMoodUI(); updateTagUI();
  document.getElementById('overlay').classList.add('active');
}

function closeSheet(e) { document.getElementById('overlay').classList.remove('active'); }
document.getElementById('overlay').addEventListener('click', closeSheet);

function selectFlow(f) { selectedFlow = f; updateFlowUI(); }
function updateFlowUI() {
  document.getElementById('flowRow').querySelectorAll('.flow-pill').forEach(p => {
    p.classList.toggle('selected', p.dataset.flow === selectedFlow);
  });
}

function selectMood(m) { selectedMood = selectedMood === m ? null : m; updateMoodUI(); }
function updateMoodUI() {
  document.getElementById('moodGrid').querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood === selectedMood);
  });
}

function toggleTag(t) {
  const i = selectedTags.indexOf(t);
  if (i >= 0) selectedTags.splice(i, 1);
  else selectedTags.push(t);
  updateTagUI();
}
function updateTagUI() {
  document.getElementById('tagRow').querySelectorAll('.tag-chip').forEach(c => {
    c.classList.toggle('selected', selectedTags.includes(c.dataset.tag));
  });
}

function saveRecord() {
  if (!currentDate) return;
  const data = getData();
  const note = document.getElementById('noteInput').value;

  if (selectedFlow !== 'none') {
    // 判断这天是否是新经期的开始（前一天没有经血记录）
    const prev = prevDay(currentDate);
    const prevRec = data.records[prev];
    const isNewPeriodStart = !prevRec || prevRec.flow === 'none';

    if (isNewPeriodStart) {
      if (!data.settings.lastPeriodStart) {
        // 还没设过 → 直接设
        data.settings.lastPeriodStart = currentDate;
      } else {
        // 已有周期 → 判断是否超出了当前经期持续天数
        const dayInCycle = diffDays(data.settings.lastPeriodStart, currentDate) + 1;
        if (dayInCycle > data.settings.periodLength) {
          // 超出经期天数 → 视为新周期开始
          data.settings.lastPeriodStart = currentDate;
        }
        // 否则是当前经期内的某天，不更新
      }
    }
  }

  if (selectedFlow === 'none' && !selectedMood && selectedTags.length === 0 && !note) {
    delete data.records[currentDate];
  } else {
    data.records[currentDate] = {
      flow: selectedFlow, mood: selectedMood,
      tags: selectedTags.slice(), note
    };
  }

  saveLocal(data);
  document.getElementById('overlay').classList.remove('active');
  renderAll();
}

function deleteRecord() {
  if (!currentDate) return;
  if (!confirm('确定删除这天的记录吗？')) return;
  const data = getData();
  delete data.records[currentDate];
  if (data.settings.lastPeriodStart === currentDate) {
    // Find new last period start
    const dates = Object.keys(data.records).sort();
    let found = null;
    for (const d of dates) {
      const r = data.records[d];
      if (r.flow && r.flow !== 'none') {
        const p = prevDay(d);
        const pr = data.records[p];
        if (!pr || pr.flow === 'none') { found = d; break; }
      }
    }
    data.settings.lastPeriodStart = found || '';
  }
  saveLocal(data);
  document.getElementById('overlay').classList.remove('active');
  renderAll();
}

  _data = getData();

      _catData = await loadCatData();
      renderToday();

  });
