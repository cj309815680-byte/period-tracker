<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小B - 身体日记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.app {
  width: 100%;
  max-width: 420px;
  background: #fff;
  min-height: 100vh;
  position: relative;
  padding-bottom: 64px;
}

/* ===== Tab Panels ===== */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  justify-content: space-around;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
  z-index: 200;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 20px;
  cursor: pointer;
  color: #999;
  font-size: 10px;
  font-weight: 500;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-item .tab-icon { font-size: 22px; }
.tab-item.active { color: #EC4899; font-weight: 600; }

/* ===== Today Dashboard ===== */
.today-container { padding: 0 16px 20px; }

.today-date {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 2px;
}
.today-weekday {
  font-size: 14px;
  color: #999;
  margin-bottom: 18px;
}

.today-reminders { display: flex; flex-direction: column; gap: 8px; }

.reminder-card {
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fafafa;
}
.reminder-card.warn {
  background: #FFF5F5;
  border: 1px solid #FECACA;
}
.reminder-card.info {
  background: #EFF6FF;
  border: 1px solid #BFDBFE;
}
.reminder-card.ok {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
}

.reminder-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.reminder-icon.period { background: #FDF2F8; }
.reminder-icon.litter { background: #EFF6FF; }
.reminder-icon.food { background: #FFFBEB; }
.reminder-icon.calendar { background: #F5F3FF; }

.reminder-body { flex: 1; min-width: 0; }
.reminder-title { font-size: 14px; font-weight: 600; color: #333; }
.reminder-desc { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.4; }

.reminder-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
}
.reminder-badge.urgent { background: #FEE2E2; color: #DC2626; }
.reminder-badge.normal { background: #EEF2FF; color: #4F46E5; }
.reminder-badge.good { background: #D1FAE5; color: #059669; }

/* No reminders */
.today-empty {
  text-align: center;
  padding: 30px 20px;
  color: #ccc;
  font-size: 14px;
}

/* Overview summary */
.today-summary {
  margin-top: 16px;
  background: #fafafa;
  border-radius: 14px;
  padding: 14px 16px;
}
.today-summary-title {
  font-size: 13px; font-weight: 600; color: #999;
  margin-bottom: 10px;
}
.today-summary-row {
  display: flex; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}
.today-summary-row:last-child { border-bottom: none; }
.today-summary-label { color: #888; }
.today-summary-val { color: #333; font-weight: 500; }

/* ===== Expense quick view (today page) ===== */
.expense-quick {
  margin-top: 12px;
  background: #fafafa; border-radius: 14px; padding: 12px 14px;
}
.expense-quick-row {
  display: flex; justify-content: space-between; align-items: center;
}
.expense-quick-label { font-size: 12px; color: #999; margin-right: 6px; }
.expense-quick-amount { font-size: 20px; font-weight: 700; color: #333; }

.expense-add-btn {
  background: #EC4899; color: #fff; border: none;
  border-radius: 16px; padding: 6px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}

.expense-form {
  display: none; margin-top: 10px;
}
.expense-form.show { display: block; }

.expense-form-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.expense-form-row:last-child { margin-bottom: 0; }

.expense-amount {
  flex: 1; border: 1px solid #e5e5e5; border-radius: 10px;
  padding: 10px 14px; font-size: 18px; font-weight: 600;
  outline: none; font-family: inherit; background: #fff;
}
.expense-amount:focus { border-color: #EC4899; }

.expense-cats {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.expense-cat {
  padding: 6px 12px; border-radius: 16px; border: 1px solid #e5e5e5;
  background: #fff; font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.expense-cat:hover { border-color: #EC4899; }
.expense-cat.selected {
  background: #FDF2F8; border-color: #EC4899; color: #EC4899; font-weight: 600;
}

.expense-note {
  flex: 1; border: 1px solid #e5e5e5; border-radius: 10px;
  padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; background: #fff;
}
.expense-note:focus { border-color: #EC4899; }

.expense-save {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  background: #EC4899; color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer;
}

/* ===== Expense Tab Page ===== */
.expense-page { padding: 14px 16px 20px; }

.expense-month-bar {
  display: flex; justify-content: center; align-items: center; gap: 16px;
  margin-bottom: 16px;
}
.expense-month-bar .strip-nav-btn { width: 30px; height: 30px; }
.expense-month-label { font-size: 16px; font-weight: 700; color: #1a1a1a; }

.expense-month-total {
  text-align: center; margin-bottom: 18px;
}
.expense-total-label { font-size: 13px; color: #999; display: block; margin-bottom: 4px; }
.expense-total-amount { font-size: 36px; font-weight: 700; color: #333; }

/* Category breakdown bars */
.expense-cat-breakdown { margin-bottom: 18px; }
.expense-cat-row {
  display: flex; align-items: center; padding: 8px 0; gap: 10px;
  border-bottom: 1px solid #f5f5f5;
}
.expense-cat-icon { font-size: 18px; width: 32px; text-align: center; flex-shrink: 0; }
.expense-cat-name { font-size: 13px; width: 40px; flex-shrink: 0; color: #555; }
.expense-cat-bar-wrap { flex: 1; height: 18px; background: #f0f0f0; border-radius: 9px; overflow: hidden; position: relative; }
.expense-cat-bar { height: 100%; border-radius: 9px; min-width: 4px; }
.expense-cat-amount { font-size: 12px; font-weight: 600; color: #333; width: 56px; text-align: right; flex-shrink: 0; }
.expense-cat-pct { font-size: 11px; color: #aaa; width: 36px; text-align: right; flex-shrink: 0; }

/* Daily list */
.expense-daily-list { }
.expense-day-group {
  margin-bottom: 12px;
}
.expense-day-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 4px;
}
.expense-day-date {
  font-size: 13px; font-weight: 600; color: #555;
}
.expense-day-total {
  font-size: 13px; font-weight: 600; color: #EC4899;
}
.expense-item {
  display: flex; align-items: center; padding: 6px 0; gap: 8px;
  font-size: 13px;
}
.expense-item-cat {
  font-size: 14px; flex-shrink: 0;
}
.expense-item-note { flex: 1; color: #888; }
.expense-item-amount { font-weight: 500; color: #333; }
.expense-item-del {
  width: 22px; height: 22px; border-radius: 11px; border: none;
  background: #fee2e2; color: #ef4444; font-size: 10px;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.expense-empty {
  text-align: center; padding: 30px; color: #ccc; font-size: 14px;
}

/* ===== Top: Phase Bar ===== */
.phase-bar {
  margin: 14px 16px;
  padding: 12px 16px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}

.phase-bar .bar-emoji { font-size: 20px; }
.phase-bar .bar-detail { font-size: 12px; opacity: 0.85; font-weight: 400; margin-left: auto; }

.phase-bar.menses { background: linear-gradient(135deg, #F472B6, #EC4899); }
.phase-bar.follicular { background: linear-gradient(135deg, #60A5FA, #3B82F6); }
.phase-bar.ovulation { background: linear-gradient(135deg, #A78BFA, #8B5CF6); }
.phase-bar.luteal { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
.phase-bar.unknown { background: #e5e5e5; color: #888; }

/* ===== Mini Month Strip ===== */
.month-strip {
  margin: 0 16px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.month-strip-label {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}

.month-strip-nav {
  display: flex;
  gap: 4px;
}

.strip-nav-btn {
  width: 28px; height: 28px;
  border: none; background: #f0f0f0;
  border-radius: 8px; font-size: 12px;
  cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
}

.mini-cal {
  margin: 0 16px 14px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  font-size: 11px;
  text-align: center;
}

.mini-cal .mini-dow {
  color: #bbb;
  font-weight: 600;
  padding: 2px 0;
}

.mini-cal .mini-day {
  padding: 5px 0;
  border-radius: 6px;
  cursor: pointer;
  color: #aaa;
  font-weight: 500;
  transition: background 0.15s;
}

.mini-cal .mini-day.this-month { color: #555; }
.mini-cal .mini-day.today { background: #FDF2F8; color: #EC4899; font-weight: 700; }
.mini-cal .mini-day.has-record::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  border-radius: 50%;
  margin: 2px auto 0;
}

.mini-cal .mini-day.has-period::after { background: #EC4899; }
.mini-cal .mini-day.has-mood:not(.has-period)::after { background: #F59E0B; }
.mini-cal .mini-day.has-tag:not(.has-period):not(.has-mood)::after { background: #60A5FA; }

.mini-cal .mini-day.selected {
  background: #EC4899;
  color: #fff;
}

/* ===== Section Divider ===== */
.section-divider {
  margin: 0 16px 12px;
  font-size: 12px;
  color: #bbb;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== Diary Entry Card ===== */
.diary-list {
  padding: 0 16px 20px;
}

.entry-card {
  background: #fafafa;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}

.entry-card:active { background: #f0f0f0; }

.entry-card .entry-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.entry-date {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}

.entry-weekday {
  font-size: 12px;
  color: #999;
  font-weight: 400;
}

.entry-phase-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  color: #fff;
}

.phase-tag-menses { background: #EC4899; }
.phase-tag-follicular { background: #3B82F6; }
.phase-tag-ovulation { background: #8B5CF6; }
.phase-tag-luteal { background: #F59E0B; }

/* Period flow line */
.entry-period {
  font-size: 14px;
  color: #EC4899;
  font-weight: 600;
  margin-bottom: 8px;
  padding: 8px 12px;
  background: #FDF2F8;
  border-radius: 8px;
  display: inline-block;
}

/* Mood display */
.entry-mood-line {
  font-size: 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.entry-mood-emoji {
  font-size: 28px;
}

.entry-mood-text {
  font-size: 15px;
  color: #555;
  font-weight: 600;
}

/* Body state tags */
.entry-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}

.entry-tag {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: #EEF2FF;
  color: #4F46E5;
  font-weight: 500;
}

/* Note */
.entry-note {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
  margin-top: 4px;
}

/* Prediction tip */
.entry-prediction {
  font-size: 12px;
  color: #888;
  padding: 6px 10px;
  background: #fafafa;
  border-radius: 6px;
  margin-bottom: 8px;
  border-left: 3px solid #ddd;
}

.entry-card:has(.phase-tag-menses) .entry-prediction { border-left-color: #EC4899; background: #FDF2F8; color: #BE185D; }
.entry-card:has(.phase-tag-follicular) .entry-prediction { border-left-color: #3B82F6; background: #EFF6FF; color: #1D4ED8; }
.entry-card:has(.phase-tag-ovulation) .entry-prediction { border-left-color: #8B5CF6; background: #F5F3FF; color: #6D28D9; }
.entry-card:has(.phase-tag-luteal) .entry-prediction { border-left-color: #F59E0B; background: #FFFBEB; color: #B45309; }

/* Empty diary */
.empty-diary {
  text-align: center;
  padding: 60px 20px;
  color: #ccc;
}

.empty-diary .empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-diary .empty-text { font-size: 15px; }
.empty-diary .empty-sub { font-size: 13px; color: #ddd; margin-top: 6px; }

/* ===== Floating Action Button ===== */
.fab {
  position: fixed;
  bottom: 80px;
  right: 50%;
  transform: translateX(210px);
  width: 56px;
  height: 56px;
  border-radius: 28px;
  background: #EC4899;
  color: #fff;
  border: none;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(236, 72, 153, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: transform 0.2s, box-shadow 0.2s;
}

.fab:active {
  transform: translateX(210px) scale(0.92);
  box-shadow: 0 2px 8px rgba(236, 72, 153, 0.3);
}

@media (max-width: 420px) {
  .fab {
    right: 16px;
    transform: none;
    bottom: 76px;
  }
  .fab:active { transform: scale(0.92); }
}

/* ===== Settings icon ===== */
.header-bar {
  padding: 14px 16px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.app-title {
  font-size: 20px;
  font-weight: 700;
  color: #1a1a1a;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 34px; height: 34px;
  border: none; background: #f0f0f0;
  border-radius: 10px; font-size: 16px;
  cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}

.icon-btn:active { background: #ddd; }

/* ===== Bottom Sheet ===== */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
.overlay.active { display: flex; }

.sheet {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 420px; max-height: 85vh;
  overflow-y: auto; padding: 8px 0 24px;
  animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 36px; height: 4px;
  background: #ddd; border-radius: 2px;
  margin: 0 auto 16px;
}

.sheet-header {
  padding: 0 20px 12px;
  border-bottom: 1px solid #f0f0f0;
  display: flex; justify-content: space-between; align-items: center;
}

.sheet-header h3 { font-size: 17px; font-weight: 700; color: #1a1a1a; }

.sheet-close {
  width: 30px; height: 30px;
  border: none; background: #f0f0f0;
  border-radius: 15px; font-size: 16px;
  cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
}

.sheet-body { padding: 16px 20px; }

.sheet-section { margin-bottom: 18px; }

.sheet-label {
  font-size: 12px; font-weight: 600; color: #aaa;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}

/* Flow pills */
.flow-row { display: flex; gap: 6px; }
.flow-pill {
  flex: 1; padding: 10px 6px;
  border: 2px solid #eee; border-radius: 10px;
  text-align: center; font-size: 12px; cursor: pointer;
  transition: all 0.15s; color: #888; background: #fff;
}
.flow-pill .pill-icon { font-size: 16px; display: block; margin-bottom: 2px; }
.flow-pill.selected { border-color: #EC4899; background: #FDF2F8; color: #EC4899; font-weight: 600; }

/* Mood grid */
.mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.mood-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px; border-radius: 12px; cursor: pointer;
  border: 2px solid transparent; font-size: 12px; color: #888;
  transition: all 0.15s;
}
.mood-btn .mood-emoji { font-size: 24px; margin-bottom: 2px; }
.mood-btn.selected { border-color: #F472B6; background: #FDF2F8; color: #DB2777; font-weight: 600; }

/* Tag chips */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1.5px solid #eee; cursor: pointer; color: #888;
  transition: all 0.15s; background: #fff;
}
.tag-chip.selected { border-color: #6366F1; background: #EEF2FF; color: #4F46E5; font-weight: 600; }

.note-input {
  width: 100%; padding: 12px; border: 1.5px solid #eee;
  border-radius: 10px; font-size: 14px; resize: none;
  font-family: inherit; min-height: 60px;
}
.note-input:focus { outline: none; border-color: #EC4899; }
.note-input::placeholder { color: #ddd; }

.btn {
  border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; padding: 12px;
  transition: all 0.15s;
}
.btn-full { width: 100%; margin-top: 8px; }
.btn-primary { background: #EC4899; color: #fff; }
.btn-primary:active { background: #DB2777; }
.btn-danger { background: #fef2f2; color: #e74c3c; }
.btn-danger:active { background: #fee; }

/* Settings */
.settings-panel { padding: 20px; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid #f0f0f0;
}
.setting-label { font-size: 14px; color: #333; }
.setting-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
.setting-input {
  width: 72px; padding: 8px; border: 1.5px solid #eee;
  border-radius: 8px; font-size: 14px; text-align: center;
}
.setting-input:focus { outline: none; border-color: #EC4899; }

/* ===== Cat Care Section ===== */
.cat-section { margin: 0 16px 14px; }
.cat-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cat-section-title {
  font-size: 15px; font-weight: 700; color: #1a1a1a;
  display: flex; align-items: center; gap: 6px;
}
.cat-updated {
  font-size: 11px; color: #bbb;
}
.cat-refresh-btn {
  font-size: 11px; color: #6366F1; cursor: pointer;
  background: none; border: none; font-weight: 600;
  padding: 2px 8px; border-radius: 6px;
}
.cat-refresh-btn:active { background: #EEF2FF; }

.cat-cards { display: flex; flex-direction: column; gap: 8px; }

.cat-card {
  background: #fafafa; border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
}
.cat-card.warn {
  background: #FFF5F5;
  border: 1px solid #FECACA;
}

.cat-card-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.cat-card-icon.litter { background: #EFF6FF; }
.cat-card-icon.feeder { background: #FFFBEB; }
.cat-card-icon.pet { background: #F0FDF4; }

.cat-card-body { flex: 1; min-width: 0; }
.cat-card-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 2px; }
.cat-card-status { font-size: 12px; color: #888; line-height: 1.5; }
.cat-card-status .ok { color: #10B981; }
.cat-card-status .warn { color: #F59E0B; }
.cat-card-status .alert { color: #EF4444; font-weight: 600; }
.cat-card-status .dim { color: #bbb; }

.cat-card-right { text-align: right; flex-shrink: 0; }
.cat-progress {
  width: 42px; height: 42px; position: relative;
}
.cat-progress-ring {
  transform: rotate(-90deg);
}
.cat-progress-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 13px; font-weight: 700; color: #555;
}

.cat-pet-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0;
}
.cat-pet-row:last-child { border-bottom: none; }
.cat-pet-avatar {

}
.cat-pet-info { flex: 1; }
.cat-pet-name { font-size: 13px; font-weight: 600; color: #333; }
.cat-pet-detail { font-size: 11px; color: #999; margin-top: 1px; }
.cat-pet-weight { font-size: 13px; font-weight: 600; color: #555; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header-bar">
    <span class="app-title">小B</span>
    <div class="header-actions">
      <span id="syncStatus" style="font-size:11px;cursor:pointer;line-height:34px;margin-right:6px" title="点击刷新云端数据" onclick="syncFromCloud()">☁️</span>
      <button class="icon-btn" onclick="openSettings()" title="设置">⚙️</button>
    </div>

  <!-- ===== Tab 1: 今日 ===== -->
  <div class="tab-panel active" id="panel-today">
    <div class="today-container" id="todayContainer">

      <!-- Expense quick view -->

            <div class="expense-cats" id="expenseCats"></div>
          </div>
          <div class="expense-form-row">

  <!-- ===== Tab 2: 生理期日记 ===== -->
  <div class="tab-panel" id="panel-diary">
    <!-- Phase Bar -->

      <span class="bar-detail" id="phaseDay"></span>
    </div>

    <!-- Mini Month Strip -->
    <div class="month-strip">
      <span class="month-strip-label" id="monthStripLabel">2026年6月</span>
      <div class="month-strip-nav">
        <button class="strip-nav-btn" onclick="prevMonth()">◀</button>
        <button class="strip-nav-btn" onclick="goToday()">●</button>
        <button class="strip-nav-btn" onclick="nextMonth()">▶</button>

    </div>
    <div class="mini-cal" id="miniCal"></div>

    <!-- Diary Section -->

    <div class="diary-list" id="diaryList">
      <div class="empty-diary" id="emptyDiary">
        <div class="empty-emoji">📝</div>
        <div class="empty-text">还没有记录</div>
        <div class="empty-sub">点右下角 ✏️ 记下今天的状态</div>
      </div>

    <!-- FAB (only visible when diary tab is active) -->
    <button class="fab" onclick="openRecordSheet(getToday())">✏️</button>
  </div>

  <!-- ===== Tab 3: 猫猫 ===== -->
  <div class="tab-panel" id="panel-cat">
    <div class="cat-section" id="catSection" style="margin-top:14px">
      <div class="cat-section-header">
        <span class="cat-section-title">🐱 猫猫</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cat-updated" id="catUpdated"></span>
          <button class="cat-refresh-btn" id="catSyncBtn" onclick="syncCatData()">🔄 同步</button>
        </div>
      </div>
      <div class="cat-cards" id="catCards">
        <div class="cat-card" style="justify-content:center;padding:20px;color:#ccc;font-size:13px">
          正在加载猫咪数据...
        </div>
      </div>

  <!-- ===== Tab 4: 记账 ===== -->
  <div class="tab-panel" id="panel-expense">
    <div class="expense-page" id="expensePage">
      <!-- Month selector -->

        <button class="strip-nav-btn" onclick="expensePrevMonth()">◀</button>
        <span class="expense-month-label" id="expenseMonthLabel">2026年6月</span>
        <button class="strip-nav-btn" onclick="expenseNextMonth()">▶</button>
      </div>
      <!-- Monthly total -->
      <div class="expense-month-total" id="expenseMonthTotal">
        <span class="expense-total-label">本月支出</span>
        <span class="expense-total-amount">¥<span id="expenseTotalAmount">0</span></span>
      </div>
      <!-- Category breakdown -->
      <div class="expense-cat-breakdown" id="expenseCatBreakdown"></div>
      <!-- Daily list -->
      <div class="expense-daily-list" id="expenseDailyList"></div>
    </div>
  </div>

  <!-- ===== Bottom Tab Bar ===== -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="today" onclick="switchTab('today')">
      <span class="tab-icon">🏠</span>今日
    </div>
    <div class="tab-item" data-tab="diary" onclick="switchTab('diary')">
      <span class="tab-icon">📓</span>日记
    </div>
    <div class="tab-item" data-tab="cat" onclick="switchTab('cat')">
      <span class="tab-icon">🐱</span>猫猫
    </div>
    <div class="tab-item" data-tab="expense" onclick="switchTab('expense')">
      <span class="tab-icon">💰</span>记账
    </div>

</div>

<!-- Bottom Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="sheetDate">6月4日 周四</h3>

    <div class="sheet-body">

      <div class="sheet-section">
        <div class="sheet-label">🩸 经期</div>
        <div class="flow-row" id="flowRow">
          <div class="flow-pill" data-flow="none" onclick="selectFlow('none')"><span class="pill-icon">✕</span>无</div>
          <div class="flow-pill" data-flow="light" onclick="selectFlow('light')"><span class="pill-icon">💧</span>少量</div>
          <div class="flow-pill" data-flow="medium" onclick="selectFlow('medium')"><span class="pill-icon">💧💧</span>中等</div>

      <div class="sheet-section">

        <div class="mood-grid" id="moodGrid">
          <div class="mood-btn" data-mood="happy" onclick="selectMood('happy')"><span class="mood-emoji">😊</span>开心</div>
          <div class="mood-btn" data-mood="neutral" onclick="selectMood('neutral')"><span class="mood-emoji">😐</span>一般</div>
          <div class="mood-btn" data-mood="sad" onclick="selectMood('sad')"><span class="mood-emoji">😢</span>难过</div>

      <div class="sheet-section">

        <div class="tag-row" id="tagRow">
          <span class="tag-chip" data-tag="头痛" onclick="toggleTag('头痛')">头痛</span>
          <span class="tag-chip" data-tag="腹胀" onclick="toggleTag('腹胀')">腹胀</span>
          <span class="tag-chip" data-tag="胸胀" onclick="toggleTag('胸胀')">胸胀</span>

          <span class="tag-chip" data-tag="水肿" onclick="toggleTag('水肿')">水肿</span>

<!-- Settings -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3>⚙️ 设置</h3>
      <button class="sheet-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-panel">
      <div class="setting-row">
        <div>
          <div class="setting-label">周期天数</div>
          <div class="setting-sub">两次经期之间的间隔</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" class="setting-input" id="cycleLength" value="28" min="20" max="45">
          <span style="font-size:13px;color:#999">天</span>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">经期持续天数</div>
          <div class="setting-sub">通常来几天</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" class="setting-input" id="periodLength" value="5" min="2" max="10">
          <span style="font-size:13px;color:#999">天</span>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">最近经期第一天</div>
          <div class="setting-sub">用来推算当前阶段</div>
        </div>
        <input type="date" class="setting-input" id="lastPeriodStart" style="width:auto">
      </div>
      <button class="btn btn-full btn-primary" onclick="saveSettings()">💾 保存设置</button>
      <button class="btn btn-full btn-danger" onclick="clearAll()" style="margin-top:6px">🗑️ 清空所有</button>
    </div>
  </div>
</div>

<script>
// ===== State =====
let currentYear = 2026;
let currentMonth = 5; // 0-based: June
let currentDate = null;
let selectedFlow = 'none';
let selectedMood = null;
let selectedTags = [];
let currentTab = 'today';

// ===== Tab Switching =====
function switchTab(tab) {
  currentTab = tab;
  // Update panels
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  // Update tab bar
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-item[data-tab="' + tab + '"]').classList.add('active');
  // Refresh relevant content
  if (tab === 'today') renderToday();
  if (tab === 'diary') renderDiaryTab();
  if (tab === 'cat') refreshCatData();
  if (tab === 'expense') renderExpensePage();
}

// ===== Today Dashboard =====
function renderToday() {
  const data = getData();
  const today = getToday();
  const { year, month, day } = parseDate(today);
  const dow = dayName(new Date(year, month, day).getDay());

  document.getElementById('todayDate').textContent = `${month+1}月${day}日`;
  document.getElementById('todayWeekday').textContent = `周${dow}`;

  let reminders = [];
  const s = data.settings;

  // 1. Period coming reminder
  if (s.lastPeriodStart) {
    const nextPeriod = new Date(s.lastPeriodStart);
    nextPeriod.setDate(nextPeriod.getDate() + s.cycleLength);
    const nextPeriodStr = fmt(nextPeriod.getFullYear(), nextPeriod.getMonth(), nextPeriod.getDate());
    const daysUntil = diffDays(today, nextPeriodStr);
    
    if (daysUntil <= 0) {
      // Already in period or late
      const phase = getPhase(data);
      if (phase && phase.phase === 'menses') {
        reminders.push({
          icon: '🩸', iconClass: 'period',
          title: '正在经期中',
          desc: `${phase.detail}`,
          badge: '进行中', badgeClass: 'urgent'
        });
      }
    } else if (daysUntil <= 2) {
      reminders.push({
        icon: '📅', iconClass: 'period',
        title: '经期即将到来',
        desc: `预计 ${daysUntil} 天后来姨妈，提前做好准备哦`,
        badge: `${daysUntil}天后`, badgeClass: 'urgent'
      });
    } else if (daysUntil <= 5) {
      reminders.push({
        icon: '📅', iconClass: 'period',
        title: '经期临近',
        desc: `预计 ${daysUntil} 天后，注意经前症状`,
        badge: `${daysUntil}天后`, badgeClass: 'normal'
      });
    }
  } else {
    reminders.push({
      icon: '⚙️', iconClass: 'calendar',
      title: '设置经期信息',
      desc: '点击右上角设置，记录经期日期以便提醒',
      badge: '待设置', badgeClass: 'normal'
    });
  }

  // 2. Cat reminders
  if (_catData) {
    const lb = _catData.litter_box;
    const fd = _catData.feeder;

    // Litter box
    if (lb && lb.box_full) {
      reminders.push({
        icon: '🚫', iconClass: 'litter',
        title: '猫砂盆垃圾袋已满！',
        desc: `「${lb.name}」需要尽快清理`,
        badge: '紧急', badgeClass: 'urgent'
      });
    } else if (lb && lb.sand_lack) {
      reminders.push({
        icon: '⚠️', iconClass: 'litter',
        title: '猫砂不足',
        desc: `「${lb.name}」剩余 ${lb.sand_percent}%，需要添加猫砂`,
        badge: '注意', badgeClass: 'urgent'
      });
    } else if (lb && lb.sand_percent <= 30) {
      reminders.push({
        icon: '🪣', iconClass: 'litter',
        title: '猫砂即将用完',
        desc: `「${lb.name}」剩余 ${lb.sand_percent}%，建议提前准备`,
        badge: '提醒', badgeClass: 'normal'
      });
    }

    // Feeder
    if (fd && fd.food <= 0) {
      reminders.push({
        icon: '🍚', iconClass: 'food',
        title: '猫粮已空！',
        desc: `「${fd.name}」需要立即加粮`,
        badge: '紧急', badgeClass: 'urgent'
      });
    } else if (fd && fd.food === 1) {
      reminders.push({
        icon: '🍚', iconClass: 'food',
        title: '猫粮偏低',
        desc: `「${fd.name}」余量不足，建议尽快加粮`,
        badge: '注意', badgeClass: 'urgent'
      });
    }

    // Desiccant
    if (fd && fd.desiccant_left_days !== undefined && fd.desiccant_left_days <= 0) {
      reminders.push({
        icon: '💧', iconClass: 'food',
        title: '干燥剂需更换',
        desc: `「${fd.name}」干燥剂已到期`,
        badge: '提醒', badgeClass: 'urgent'
      });
    }

    // Pet out tips (cat hasn't used litter box)
    if (lb && lb.pet_out_tips) {
      for (const tip of lb.pet_out_tips) {
        if (tip.out_day > 0) {
          reminders.push({
            icon: '🐱', iconClass: 'litter',
            title: `${tip.pet_name} 没上厕所`,
            desc: `已 ${tip.out_day} 天没有使用猫砂盆，需要关注`,
            badge: '注意', badgeClass: 'urgent'
          });
        }
      }
    }
  }

  // Render reminders
  const container = document.getElementById('todayReminders');
  if (reminders.length === 0) {
    container.innerHTML = '<div class="today-empty">✨ 一切正常，今天没什么需要操心的</div>';
  } else {
    // Sort: urgent first
    const badgeOrder = { '紧急': 0, '注意': 1, '提醒': 2, '进行中': 0 };
    reminders.sort((a, b) => (badgeOrder[a.badge] || 9) - (badgeOrder[b.badge] || 9));
    
    container.innerHTML = reminders.map(r => {
      let cardClass = 'reminder-card';
      if (r.badgeClass === 'urgent') cardClass += ' warn';
      else if (r.badgeClass === 'normal') cardClass += ' info';
      return `<div class="${cardClass}">
        <div class="reminder-icon ${r.iconClass}">${r.icon}</div>
        <div class="reminder-body">
          <div class="reminder-title">${r.title}</div>
          <div class="reminder-desc">${r.desc}</div>
        </div>
        <span class="reminder-badge ${r.badgeClass}">${r.badge}</span>
      </div>`;
    }).join('');
  }

  // Summary
  renderTodaySummary(data);
  renderExpenseStats();
}

function renderTodaySummary(data) {
  const el = document.getElementById('todaySummary');
  let html = '<div class="today-summary-title">📊 状态概览</div>';
  let rows = [];

  const s = data.settings;
  const today = getToday();

  if (s.lastPeriodStart) {
    const p = getPhase(data);
    const phaseNames = { menses:'经期', follicular:'卵泡期', ovulation:'排卵期', luteal:'黄体期' };
    if (p) {
      rows.push({ label: '当前阶段', val: phaseNames[p.phase] + ' · 第' + p.day + '天' });
      const nextPeriod = new Date(s.lastPeriodStart);
      nextPeriod.setDate(nextPeriod.getDate() + s.cycleLength);
      const nextStr = fmt(nextPeriod.getFullYear(), nextPeriod.getMonth(), nextPeriod.getDate());
      const daysUntil = diffDays(today, nextStr);
      if (daysUntil > 0) {
        rows.push({ label: '距下次经期', val: daysUntil + ' 天' });
      }
    }
    rows.push({ label: '周期', val: s.cycleLength + '天 · 经期' + s.periodLength + '天' });
  }

  if (_catData) {
    const lb = _catData.litter_box;
    const fd = _catData.feeder;
    if (lb && lb.name) {
      rows.push({ label: '猫砂余量', val: lb.sand_percent + '%' });
      rows.push({ label: '今日如厕', val: lb.today_times + ' 次' });
    }
    if (fd && fd.name) {
      const foodMap = { 0: '已空', 1: '偏低', 2: '正常', 3: '充足' };
      rows.push({ label: '猫粮状态', val: foodMap[fd.food] || '未知' });
    }
  }

  if (rows.length > 0) {
    html += rows.map(r => 
      `<div class="today-summary-row"><span class="today-summary-label">${r.label}</span><span class="today-summary-val">${r.val}</span></div>`
    ).join('');
    el.innerHTML = html;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function renderDiaryTab() {
  renderPhaseBar();
  renderMiniCal();
  renderDiary();
}

// ===== Expense Tracking =====
const EXPENSE_CATS = [
  { key: '餐饮', emoji: '🍜', color: '#F59E0B' },
  { key: '交通', emoji: '🚗', color: '#3B82F6' },
  { key: '购物', emoji: '🛒', color: '#EC4899' },
  { key: '娱乐', emoji: '🎮', color: '#8B5CF6' },
  { key: '日用', emoji: '🏠', color: '#10B981' },
  { key: '其他', emoji: '💰', color: '#6B7280' }
];
let selectedCat = null;
let expenseYear, expenseMonth;

function initExpenseState() {
  const now = new Date();
  expenseYear = now.getFullYear();
  expenseMonth = now.getMonth(); // 0-based
}

function toggleExpenseForm() {
  const form = document.getElementById('expenseForm');
  form.classList.toggle('show');
  if (form.classList.contains('show')) {
    document.getElementById('expenseAmount').focus();
    if (!document.getElementById('expenseCats').children.length) renderExpenseCats();
  }
}

function renderExpenseCats() {
  document.getElementById('expenseCats').innerHTML = EXPENSE_CATS.map(c =>
    `<span class="expense-cat" onclick="selectCat('${c.key}', this)">${c.emoji} ${c.key}</span>`
  ).join('');
  selectedCat = null;
}

function selectCat(key, el) {
  document.querySelectorAll('.expense-cat').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCat = key;
}

function saveExpense() {
  const amountStr = document.getElementById('expenseAmount').value;
  const note = document.getElementById('expenseNote').value.trim();
  if (!amountStr || parseFloat(amountStr) <= 0) {
    document.getElementById('expenseAmount').focus();
    return;
  }
  if (!selectedCat) {
    alert('请选择一个分类');
    return;
  }
  const amount = Math.round(parseFloat(amountStr) * 100) / 100;
  const today = getToday();

  const data = getData();
  if (!data.expenses) data.expenses = {};
  if (!data.expenses[today]) data.expenses[today] = [];
  data.expenses[today].push({ amount, category: selectedCat, note });

  _data = data;
  localStorage.setItem('xiaob_bodylog_v2', JSON.stringify(data));
  saveToCloud(data);

  // Reset form
  document.getElementById('expenseAmount').value = '';
  document.getElementById('expenseNote').value = '';
  selectedCat = null;
  document.querySelectorAll('.expense-cat').forEach(c => c.classList.remove('selected'));
  document.getElementById('expenseForm').classList.remove('show');

  renderExpenseStats();
  renderTodaySummary(getData());
  // Refresh expense page if on that tab
  if (currentTab === 'expense') renderExpensePage();
}

function renderExpenseStats() {
  const data = getData();
  const today = getToday();
  let todayTotal = 0;
  if (data.expenses && data.expenses[today]) {
    for (const item of data.expenses[today]) {
      todayTotal += item.amount;
    }
  }
  document.getElementById('todayExpense').textContent = todayTotal.toFixed(2);
}

// ===== Expense Tab Page =====
function renderExpensePage() {
  if (!expenseYear) initExpenseState();
  document.getElementById('expenseMonthLabel').textContent = `${expenseYear}年${expenseMonth+1}月`;
  
  const data = getData();
  const prefix = `${expenseYear}-${String(expenseMonth+1).padStart(2,'0')}-`;
  
  // Collect all items for this month
  let allItems = [];
  let monthlyTotal = 0;
  const catTotals = {};
  EXPENSE_CATS.forEach(c => catTotals[c.key] = 0);

  if (data.expenses) {
    for (const [date, items] of Object.entries(data.expenses)) {
      if (date.startsWith(prefix)) {
        for (const item of items) {
          allItems.push({ date, ...item });
          monthlyTotal += item.amount;
          catTotals[item.category] = (catTotals[item.category] || 0) + item.amount;
        }
      }
    }
  }

  // Total
  document.getElementById('expenseTotalAmount').textContent = monthlyTotal.toFixed(2);

  // Category breakdown
  renderCatBreakdown(catTotals, monthlyTotal);

  // Daily list
  renderDailyList(allItems);
}

function renderCatBreakdown(catTotals, monthlyTotal) {
  const el = document.getElementById('expenseCatBreakdown');
  const catEmoji = {};
  const catColor = {};
  EXPENSE_CATS.forEach(c => { catEmoji[c.key] = c.emoji; catColor[c.key] = c.color; });

  // Sort by amount desc
  const sorted = EXPENSE_CATS
    .map(c => ({ ...c, amount: catTotals[c.key] }))
    .sort((a, b) => b.amount - a.amount);

  if (monthlyTotal === 0) {
    el.innerHTML = '<div class="expense-empty">暂无记录</div>';
    return;
  }

  el.innerHTML = sorted.filter(c => c.amount > 0).map(c => {
    const pct = ((c.amount / monthlyTotal) * 100).toFixed(0);
    const barW = Math.max(pct, 3);
    return `<div class="expense-cat-row">
      <span class="expense-cat-icon">${c.emoji}</span>
      <span class="expense-cat-name">${c.key}</span>
      <div class="expense-cat-bar-wrap">
        <div class="expense-cat-bar" style="width:${barW}%;background:${c.color}"></div>
      </div>
      <span class="expense-cat-amount">¥${c.amount.toFixed(2)}</span>
      <span class="expense-cat-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function renderDailyList(allItems) {
  const el = document.getElementById('expenseDailyList');
  if (allItems.length === 0) {
    el.innerHTML = '<div class="expense-empty">这个月还没有记账</div>';
    return;
  }

  // Group by date (newest first)
  const groups = {};
  for (const item of allItems) {
    if (!groups[item.date]) groups[item.date] = { total: 0, items: [] };
    groups[item.date].total += item.amount;
    groups[item.date].items.push(item);
  }

  const sortedDates = Object.keys(groups).sort().reverse();
  const catEmoji = {};
  EXPENSE_CATS.forEach(c => catEmoji[c.key] = c.emoji);

  el.innerHTML = sortedDates.map(date => {
    const g = groups[date];
    const [y, m, d] = date.split('-').map(Number);
    const dow = ['日','一','二','三','四','五','六'][new Date(y, m-1, d).getDay()];
    return `<div class="expense-day-group">
      <div class="expense-day-header">
        <span class="expense-day-date">${m}月${d}日 周${dow}</span>
        <span class="expense-day-total">¥${g.total.toFixed(2)}</span>
      </div>
      ${g.items.map((item, idx) => `
        <div class="expense-item">
          <span class="expense-item-cat">${catEmoji[item.category] || ''}</span>
          <span class="expense-item-note">${item.note || item.category}</span>
          <span class="expense-item-amount">¥${item.amount.toFixed(2)}</span>
          <button class="expense-item-del" onclick="deleteExpenseItem('${date}',${idx})" title="删除">✕</button>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

function deleteExpenseItem(date, idx) {
  const data = getData();
  if (!data.expenses || !data.expenses[date]) return;
  data.expenses[date].splice(idx, 1);
  if (data.expenses[date].length === 0) delete data.expenses[date];
  _data = data;
  localStorage.setItem('xiaob_bodylog_v2', JSON.stringify(data));
  saveToCloud(data);
  renderExpensePage();
  renderExpenseStats();
}

function expensePrevMonth() {
  expenseMonth--;
  if (expenseMonth < 0) { expenseMonth = 11; expenseYear--; }
  renderExpensePage();
}

function expenseNextMonth() {
  expenseMonth++;
  if (expenseMonth > 11) { expenseMonth = 0; expenseYear++; }

function getToken() {

function showSync(status, text) {

async function syncFromCloud() {
  const token = getToken();
  if (!token) {
    alert('请先输入 GitHub Token');
    return;
  }
  showSync('loading', '从云端同步...');
  try {
    // Read via GitHub Pages (no auth, no CORS issues)
    const readUrl = 'https://cj309815680-byte.github.io/period-tracker/data.json?t=' + Date.now();
    const resp = await fetch(readUrl, { cache: 'no-store' });
    
    // Get sha for future writes (via API)
    let apiOk = false;
    try {
      const apiResp = await fetch(GH_API, {
        headers: { 'Authorization': 'token ' + token, 'Cache-Control': 'no-cache' }
      });
      if (apiResp.ok) {
        const json = await apiResp.json();
        ghSha = json.sha;
        apiOk = true;
      }
    } catch (apiErr) {
      console.log('API sha fetch failed:', apiErr.message);
    }
    
    if (!resp.ok) {
      _data = getData();
      showSync(apiOk ? 'ok' : 'error', apiOk ? '读取失败，使用本地' : '无法连接');
      renderAll();
      return;
    }
    
    const data = await resp.json();
    const localData = getData();
    
    // If cloud is empty but local has data, offer to upload
    if (Object.keys(data.records).length === 0 && Object.keys(localData.records).length > 0) {
      if (confirm('云端暂无数据，是否将本地记录上传到云端？')) {
        _data = localData;
        saveToCloud(localData);
        showSync('saved', '已上传到云端');
        setTimeout(() => showSync('ok', '已同步'), 2000);
      } else {
        _data = data;
      }
    } else {
      _data = data;
      localStorage.setItem('xiaob_bodylog_v2', JSON.stringify(data));
      showSync('saved', '已同步');
      setTimeout(() => showSync('ok', '已同步'), 1500);
    }
    renderAll();
  } catch (e) {
    showSync('error', '同步失败');
    console.log('Sync failed:', e);
    _data = getData();
    renderAll();
  }
}

async function saveToCloud(data) {
  _data = data;
  localStorage.setItem('xiaob_bodylog_v2', JSON.stringify(data));
  const token = getToken();
  if (!token) return;
  showSync('loading', '保存中...');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 0))));
    const payload = { message: 'update bodylog data', content: content, branch: 'main' };
    if (ghSha) payload.sha = ghSha;
    const resp = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json',
        'Cache-Control': 'no-cache'
      },
      body: JSON.stringify(payload)
    });
    if (resp.ok) {
      const json = await resp.json();
      ghSha = json.content.sha;
      showSync('saved', '已保存到云端');
      setTimeout(() => showSync('ok', '已同步'), 2000);
    } else if (resp.status === 409 || resp.status === 422) {
      // Conflict or sha mismatch: re-fetch and retry
      const refresh = await fetch(GH_API, {
        headers: { 'Authorization': 'token ' + token, 'Cache-Control': 'no-cache' }
      });
      if (refresh.ok) {
        const rj = await refresh.json();
        ghSha = rj.sha;
        payload.sha = ghSha;
        const retry = await fetch(GH_API, {
          method: 'PUT',
          headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (retry.ok) {
          const rj2 = await retry.json();
          ghSha = rj2.content.sha;
          showSync('saved', '已保存到云端');
          setTimeout(() => showSync('ok', '已同步'), 2000);
        } else {
          showSync('error', '保存失败，请刷新重试');
        }
      }
    } else {
      showSync('error', '保存失败（' + resp.status + '）');
    }
  } catch (e) {
    console.log('Cloud save failed:', e.message);
    showSync('error', '离线保存');
  }
}

let _syncTimer = null;
async function syncCatData() {
  const token = getToken();
  if (!token) {
    alert('请先设置 GitHub Token（用于同步）');
    return;
  }
  
  const btn = document.getElementById('catSyncBtn');
  btn.textContent = '⏳ 触发中...';
  btn.style.color = '#F59E0B';
  btn.disabled = true;
  
  try {
    // Trigger the GitHub Actions workflow
    const resp = await fetch('https://api.github.com/repos/cj309815680-byte/period-tracker/actions/workflows/update-petkit.yml/dispatches', {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main' })
    });
    
    if (resp.ok) {
      btn.textContent = '⏳ 等待更新...';
      btn.style.color = '#60A5FA';
      
      // Poll for updates (every 5 seconds, up to 1 minute)
      let tries = 0;
      const oldUpdated = _catData ? _catData.updated_at : null;
      
      if (_syncTimer) clearInterval(_syncTimer);
      _syncTimer = setInterval(async () => {
        tries++;
        const data = await loadCatData();
        if (data && data.updated_at !== oldUpdated) {
          // Data updated!
          clearInterval(_syncTimer);
          _syncTimer = null;
          _catData = data;
          renderCatSection();
          renderToday();
          btn.textContent = '✅ 已同步';
          btn.style.color = '#10B981';
          btn.disabled = false;
          setTimeout(() => {
            btn.textContent = '🔄 同步';
            btn.style.color = '#6366F1';
          }, 3000);
        } else if (tries >= 12) {
          // Timeout after 1 minute
          clearInterval(_syncTimer);
          _syncTimer = null;
          _catData = await loadCatData();
          renderCatSection();
          renderToday();
          btn.textContent = '🔄 同步';
          btn.style.color = '#6366F1';
          btn.disabled = false;
        }
      }, 5000);
    } else {
      throw new Error('HTTP ' + resp.status);
    }
  } catch(e) {
    btn.textContent = '🔄 同步';
    btn.style.color = '#6366F1';
    btn.disabled = false;
    alert('触发失败: ' + e.message + '\n\n请确认：\n1. workflow 文件已创建\n2. Token 有 repo 权限');
  }
}

function fmt(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDate(str) { const [y,m,d]=str.split('-').map(Number); return {year:y,month:m-1,day:d}; }
function getToday() { const d=new Date(); return fmt(d.getFullYear(),d.getMonth(),d.getDate()); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function dayName(dow) { return ['日','一','二','三','四','五','六'][dow]; }
function diffDays(d1,d2) { return Math.floor((new Date(d2)-new Date(d1))/(86400000)); }
function prevDay(d) { const dt=new Date(d); dt.setDate(dt.getDate()-1); return fmt(dt.getFullYear(),dt.getMonth(),dt.getDate()); }

// ===== Phase =====
function getPhase(data) {
  const s = data.settings;
  if (!s.lastPeriodStart) return null;
  const today = getToday();
  const dayInCycle = diffDays(s.lastPeriodStart, today) + 1;
  if (dayInCycle <= 0) {
    const until = -dayInCycle + 1;
    return { phase:'luteal', day:dayInCycle, detail:`预计 ${until} 天后来月经` };
  }
  const cl = s.cycleLength;
  const pl = s.periodLength;
  const day = ((dayInCycle - 1) % cl) + 1;
  if (day <= pl) {
    return { phase:'menses', day, detail:`经期第${day}天 · 还剩${pl-day+1}天` };
  }
  const ovDay = cl - 14;
  if (day < ovDay) {
    return { phase:'follicular', day, detail:`卵泡期 · 距排卵约${ovDay-day}天` };
  }
  if (day <= ovDay + 2) {
    return { phase:'ovulation', day, detail:'排卵期 · 易孕期' };
  }
  return { phase:'luteal', day, detail:`黄体期 · 距经期约${cl-day+1}天` };
}

function getPhaseInfo(data, dateStr) {
  const s = data.settings;
  if (!s.lastPeriodStart) return null;
  const d = diffDays(s.lastPeriodStart, dateStr) + 1;
  if (d <= 0) return null;
  const cl = s.cycleLength, pl = s.periodLength;
  const cycleDay = ((d - 1) % cl) + 1;
  const ovDay = cl - 14;
  const ovWindow = 3;

  let phase, phaseDay, phaseTotal, prediction;

  if (cycleDay <= pl) {
    phase = 'menses';
    phaseDay = cycleDay;
    phaseTotal = pl;
    if (cycleDay <= 2) prediction = '经期初期，注意保暖休息 ☕';
    else if (cycleDay <= pl - 1) prediction = '经期中段，多喝热水，适当休息 🛌';
    else prediction = '经期末尾，状态逐渐恢复 🌿';
  } else if (cycleDay < ovDay) {
    phase = 'follicular';
    phaseDay = cycleDay - pl;
    phaseTotal = ovDay - pl;
    if (phaseDay <= 3) prediction = '卵泡期初期，精力开始回升 💫';
    else prediction = '卵泡期，状态越来越好，皮肤在变好 ✨';
  } else if (cycleDay <= ovDay + ovWindow - 1) {
    phase = 'ovulation';
    phaseDay = cycleDay - ovDay + 1;
    phaseTotal = ovWindow;
    prediction = '排卵期，精力旺盛，适合运动和社交 🏃‍♀️';
  } else {
    phase = 'luteal';
    phaseDay = cycleDay - ovDay - ovWindow + 1;
    phaseTotal = cl - ovDay - ovWindow + 1;
    if (phaseDay <= 3) prediction = '黄体期早期，状态平稳 😌';
    else if (phaseDay <= phaseTotal - 5) prediction = '黄体中期，可能出现情绪波动 🌊';
    else if (phaseDay <= phaseTotal - 3) prediction = '经前数日，注意腹胀、胸胀 ⚠️';
    else prediction = '经前最后几天，疲劳加重、情绪敏感，对自己好一点 💆‍♀️';
  }

  return { phase, phaseDay, phaseTotal, cycleDay, prediction };
}

// ===== Render =====
function renderAll() {
  renderToday();
  renderPhaseBar();
  renderMiniCal();
  renderDiary();
  renderCatSection();
}

function renderPhaseBar() {
  const data = getData();
  const p = getPhase(data);
  const bar = document.getElementById('phaseBar');
  if (!p) {
    bar.className = 'phase-bar unknown';
    document.getElementById('phaseEmoji').textContent = '📅';
    document.getElementById('phaseText').textContent = '请先设置经期日期';
    document.getElementById('phaseDay').textContent = '';
    return;
  }
  bar.className = 'phase-bar ' + p.phase;
  const emoji = { menses:'🩸', follicular:'🌱', ovulation:'✨', luteal:'🌙' };
  const text = { menses:'经期', follicular:'卵泡期', ovulation:'排卵期', luteal:'黄体期' };
  document.getElementById('phaseEmoji').textContent = emoji[p.phase];
  document.getElementById('phaseText').textContent = text[p.phase];
  document.getElementById('phaseDay').textContent = p.detail;
}

function renderMiniCal() {
  const grid = document.getElementById('miniCal');
  const data = getData();
  const today = getToday();
  const m = currentMonth;
  const y = currentYear;

  document.getElementById('monthStripLabel').textContent = `${y}年${m+1}月`;

  let html = '';
  ['一','二','三','四','五','六','日'].forEach(d => {
    html += `<span class="mini-dow">${d}</span>`;
  });

  const firstDOW = new Date(y,m,1).getDay();
  const offset = firstDOW === 0 ? 6 : firstDOW - 1;
  const totalDays = daysInMonth(y,m);
  const prevDays = daysInMonth(y, m-1);

  for (let i = offset-1; i >= 0; i--) {
    html += miniDayHtml(prevDays - i, false, today, data, y, m-1);
  }
  for (let d=1; d<=totalDays; d++) {
    html += miniDayHtml(d, true, today, data, y, m);
  }
  const rem = 42 - (offset + totalDays);
  for (let d=1; d<=rem; d++) {
    html += miniDayHtml(d, false, today, data, y, m+1);
  }

  grid.innerHTML = html;

  // Add click handlers
  grid.querySelectorAll('.mini-day.this-month').forEach(el => {
    el.addEventListener('click', () => {
      const day = parseInt(el.dataset.day);
      const ds = fmt(currentYear, currentMonth, day);
      openRecordSheet(ds);
    });
  });
}

function miniDayHtml(day, thisMonth, today, data, y, m) {
  const ds = fmt(y, m, day);
  const rec = data.records[ds];
  let cls = 'mini-day';
  if (thisMonth) cls += ' this-month';
  if (ds === today) cls += ' today';
  if (rec) {
    if (rec.flow && rec.flow !== 'none') cls += ' has-record has-period';
    else if (rec.mood) cls += ' has-record has-mood';
    else if (rec.tags && rec.tags.length > 0) cls += ' has-record has-tag';
    else cls += ' has-record';
  }
  return `<span class="${cls}" data-day="${day}">${day}</span>`;
}

function renderDiary() {
  const data = getData();
  const today = getToday();
  const list = document.getElementById('diaryList');
  const empty = document.getElementById('emptyDiary');

  // Get all dates this month that have records, sorted newest first
  const start = fmt(currentYear, currentMonth, 1);
  const end = fmt(currentYear, currentMonth, daysInMonth(currentYear, currentMonth));
  const records = [];

  for (const [ds, rec] of Object.entries(data.records)) {
    // Only show records for current month
    const { year, month } = parseDate(ds);
    if (year === currentYear && month === currentMonth) {
      records.push({ ds, rec });
    }
  }

  records.sort((a,b) => b.ds.localeCompare(a.ds));

  if (records.length === 0) {
    empty.style.display = 'block';
    // Remove any entry cards
    list.querySelectorAll('.entry-card').forEach(c => c.remove());
    return;
  }

  empty.style.display = 'none';

  let html = '';
  const phaseNames = { menses:'经期', follicular:'卵泡期', ovulation:'排卵期', luteal:'黄体期' };
  const flowLabels = { light:'少量', medium:'中等', heavy:'偏多' };

  for (const { ds, rec } of records) {
    const { year, month, day } = parseDate(ds);
    const dow = dayName(new Date(year, month, day).getDay());
    const info = getPhaseInfo(data, ds);

    html += '<div class="entry-card" data-date="' + ds + '">';
    html += '<div class="entry-header">';
    html += `<span class="entry-date">${month+1}月${day}日 <span class="entry-weekday">周${dow}</span></span>`;
    if (info) {
      html += `<span class="entry-phase-tag phase-tag-${info.phase}">${phaseNames[info.phase]}第${info.phaseDay}天</span>`;
    }
    html += '</div>';

    // Prediction tip
    if (info && info.prediction) {
      html += `<div class="entry-prediction">${info.prediction}</div>`;
    }

    if (rec.flow && rec.flow !== 'none') {
      html += `<div class="entry-period">🩸 经期 · ${flowLabels[rec.flow]}</div>`;
    }

    if (rec.mood) {
      html += `<div class="entry-mood-line"><span class="entry-mood-emoji">${MOOD_MAP[rec.mood]}</span><span class="entry-mood-text">${MOOD_TEXT[rec.mood]}</span></div>`;
    }

    if (rec.tags && rec.tags.length > 0) {
      html += '<div class="entry-tags">';
      rec.tags.forEach(t => { html += `<span class="entry-tag">${t}</span>`; });
      html += '</div>';
    }

    if (rec.note) {
      html += `<div class="entry-note">${rec.note}</div>`;
    }

    html += '</div>';
  }

  // Preserve empty div, add cards after
  const existing = list.querySelectorAll('.entry-card');
  existing.forEach(c => c.remove());
  list.insertAdjacentHTML('beforeend', html);

  // Add click handlers
  list.querySelectorAll('.entry-card').forEach(card => {
    card.addEventListener('click', () => {
      openRecordSheet(card.dataset.date);
    });
  });
}

// ===== Sheet =====
function openRecordSheet(dateStr) {
  const data = getData();
  const rec = data.records[dateStr] || null;
  const { year, month, day } = parseDate(dateStr);
  currentDate = dateStr;
  selectedFlow = rec ? rec.flow || 'none' : 'none';
  selectedMood = rec ? rec.mood : null;
  selectedTags = rec ? (rec.tags || []).slice() : [];
  document.getElementById('noteInput').value = rec ? rec.note || '' : '';
  document.getElementById('sheetDate').textContent = `${month+1}月${day}日 周${dayName(new Date(year,month,day).getDay())}`;
  document.getElementById('deleteBtn').style.display = rec ? 'block' : 'none';
  updateFlowUI(); updateMoodUI(); updateTagUI();
  document.getElementById('overlay').classList.add('active');
}

function closeSheet(e) { document.getElementById('overlay').classList.remove('active'); }
document.getElementById('overlay').addEventListener('click', closeSheet);

function selectFlow(f) { selectedFlow = f; updateFlowUI(); }
function updateFlowUI() {
  document.getElementById('flowRow').querySelectorAll('.flow-pill').forEach(p => {
    p.classList.toggle('selected', p.dataset.flow === selectedFlow);
  });
}

function selectMood(m) { selectedMood = selectedMood === m ? null : m; updateMoodUI(); }
function updateMoodUI() {
  document.getElementById('moodGrid').querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood === selectedMood);
  });
}

function toggleTag(t) {
  const i = selectedTags.indexOf(t);
  if (i >= 0) selectedTags.splice(i, 1);
  else selectedTags.push(t);
  updateTagUI();
}
function updateTagUI() {
  document.getElementById('tagRow').querySelectorAll('.tag-chip').forEach(c => {
    c.classList.toggle('selected', selectedTags.includes(c.dataset.tag));
  });
}

function saveRecord() {
  if (!currentDate) return;
  const data = getData();
  const note = document.getElementById('noteInput').value;

  if (selectedFlow !== 'none') {
    if (!data.settings.lastPeriodStart || currentDate < data.settings.lastPeriodStart) {
      const prev = prevDay(currentDate);
      const prevRec = data.records[prev];
      if (!prevRec || prevRec.flow === 'none') {
        data.settings.lastPeriodStart = currentDate;
      }
    }
  }

  if (selectedFlow === 'none' && !selectedMood && selectedTags.length === 0 && !note) {
    delete data.records[currentDate];
  } else {
    data.records[currentDate] = {
      flow: selectedFlow, mood: selectedMood,
      tags: selectedTags.slice(), note
    };
  }

  saveToCloud(data);
  document.getElementById('overlay').classList.remove('active');
  renderAll();
}

function deleteRecord() {
  if (!currentDate) return;
  if (!confirm('确定删除这天的记录吗？')) return;
  const data = getData();
  delete data.records[currentDate];
  if (data.settings.lastPeriodStart === currentDate) {
    // Find new last period start
    const dates = Object.keys(data.records).sort();
    let found = null;
    for (const d of dates) {
      const r = data.records[d];
      if (r.flow && r.flow !== 'none') {
        const p = prevDay(d);
        const pr = data.records[p];
        if (!pr || pr.flow === 'none') { found = d; break; }
      }
    }
    data.settings.lastPeriodStart = found || '';
  }
  saveToCloud(data);
  document.getElementById('overlay').classList.remove('active');
  renderAll();
}

// ===== Calendar Nav =====
function prevMonth() {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; }
  else currentMonth--;
  renderAll();
}
function nextMonth() {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; }
  else currentMonth++;
  renderAll();
}
function goToday() {
  const today = getToday();
  const [y,m] = today.split('-').map(Number);
  currentYear = y; currentMonth = m - 1;
  renderAll();
}

// ===== Settings =====
function openSettings() {
  const data = getData();
  document.getElementById('cycleLength').value = data.settings.cycleLength;
  document.getElementById('periodLength').value = data.settings.periodLength;
  document.getElementById('lastPeriodStart').value = data.settings.lastPeriodStart;
  document.getElementById('settingsOverlay').classList.add('active');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('active'); }
document.getElementById('settingsOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
});

function saveSettings() {
  const data = getData();
  data.settings.cycleLength = parseInt(document.getElementById('cycleLength').value) || 28;
  data.settings.periodLength = parseInt(document.getElementById('periodLength').value) || 5;
  data.settings.lastPeriodStart = document.getElementById('lastPeriodStart').value;
  saveToCloud(data);
  closeSettings();
  renderAll();
}

function clearAll() {
  if (!confirm('确定要清空所有记录吗？不可撤销！')) return;
  _data = defaultData();
  localStorage.removeItem('xiaob_bodylog_v2');
  saveToCloud(_data);
  closeSettings();
  renderAll();
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', async () => {
  const today = getToday();
  const [y,m] = today.split('-').map(Number);
  currentYear = y; currentMonth = m - 1;

  const token = getToken();
  if (token) {
    await syncFromCloud();
  } else {
    _data = getData();
    // Ask for token
    const t = prompt('首次使用云端同步，请输入 GitHub Token：\n\n（生成方式：GitHub → Settings → Developer settings → Personal access tokens → Generate new token，勾选 repo 权限）\n\n留空则仅使用本地存储。');
    if (t && t.trim()) {
      setToken(t.trim());
      await syncFromCloud();
    } else {
      showSync('ok', '本地模式');
    }
  }
  
  // Load cat data
  _catData = await loadCatData();

  // Render everything
  renderAll();

  // Auto-sync when tab becomes visible
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && getToken()) {
      syncFromCloud();
    }
    if (!document.hidden) {
      renderToday();
    }
  });
});
